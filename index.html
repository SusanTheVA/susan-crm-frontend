<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Susan CRM v1.1</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(56, 189, 248, 0.55)),
        url("/background.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    .app-shell { width: 100%; height: 100%; display: none; }

    .login-shell {
      background: rgba(255, 255, 255, 0.96);
      padding: 24px 28px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.45), 0 0 0 1px rgba(148, 163, 184, 0.3);
      width: 340px;
      border-top: 4px solid #7c3aed;
      align-self: center;
    }
    .login-shell h1 { font-size: 18px; margin: 0 0 8px; }
    .login-shell p { margin: 0 0 14px; font-size: 13px; color: #4b5563; }
    .login-shell label { display: block; font-size: 13px; margin-top: 10px; }
    .login-shell input {
      width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box;
      border-radius: 6px; border: 1px solid #cbd5e1;
    }
    .login-shell button, .composer button {
      border-radius: 999px; border: none;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white; cursor: pointer; font-weight: 600;
    }
    .login-shell button { margin-top: 16px; width: 100%; padding: 8px 10px; font-size: 14px; }
    .login-shell button:hover, .composer button:hover { filter: brightness(1.05); }
    .login-error { color: #b00020; font-size: 12px; margin-top: 8px; }

    .layout {
      height: 100vh; display: flex; background: rgba(248, 250, 252, 0.98);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.45), 0 0 0 1px rgba(148, 163, 184, 0.3);
      border-radius: 24px; margin: 12px; overflow: hidden; width: calc(100% - 24px);
    }
    .sidebar {
      width: 32%; max-width: 420px; border-right: 1px solid #e5e7eb;
      padding: 16px; box-sizing: border-box; overflow-y: auto; background: #ffffff;
    }
    .main { flex: 1; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; background: #f9fafb; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
    .top-bar button, .filter-row select, .status-controls select {
      font-size: 11px; padding: 4px 8px; border-radius: 999px; border: 1px solid #e5e7eb; background: #ffffff; cursor: pointer;
    }
    .top-bar button:hover { background: #f3f4f6; }

    .filter-card {
      background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 10px; margin-bottom: 12px;
    }
    .filter-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .filter-row label { font-size: 11px; color: #4b5563; }
    .filter-row select { flex: 1; min-width: 0; }
    .tenant-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 999px;
      background: #eef2ff; color: #3730a3; font-size: 11px; font-weight: 700;
    }

    .conversation-item {
      padding: 9px; border-radius: 10px; cursor: pointer; margin-bottom: 7px;
      border: 1px solid transparent; background: #ffffff;
      transition: background 0.1s ease, border-color 0.1s ease;
    }
    .conversation-item:hover { background: #f3f4ff; }
    .conversation-item.active { border-color: #4f46e5; background: #eef2ff; }
    .conversation-name { font-weight: 700; font-size: 14px; display:flex; justify-content:space-between; gap:8px; }
    .conversation-phone, .conversation-preview, .conversation-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .conversation-preview { color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { font-size: 10px; border-radius: 999px; padding: 2px 7px; background: #e0f2fe; color: #0369a1; white-space: nowrap; }
    .badge.email { background: #ecfdf5; color: #047857; }
    .badge.website_chat { background: #f5f3ff; color: #6d28d9; }
    .badge.whatsapp { background: #dcfce7; color: #166534; }

    .header { border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 8px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 12px; }
    .contact-header { font-size: 13px; color: #111827; }
    .status-controls label { font-size: 12px; color: #4b5563; }
    .status-controls select { margin-left: 4px; background: #eff6ff; border-color: #cbd5f5; }
    .stats-panel { font-size: 11px; color: #4b5563; background: #f9fafb; border-radius: 12px; padding: 6px 10px; border: 1px solid rgba(148, 163, 184, 0.4); }
    .stat-row { display: flex; justify-content: space-between; gap: 14px; }
    .stat-row strong { font-weight: 700; }

    .messages { flex: 1; overflow-y: auto; padding-right: 8px; margin-bottom: 8px; }
    .message { max-width: 72%; padding: 8px 10px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }
    .message.inbound { background: #e5e7eb; align-self: flex-start; }
    .message.outbound { background: #4f46e5; color: #ffffff; align-self: flex-end; }
    .message-meta { font-size: 10px; color: #6b7280; margin-top: 2px; }
    .composer { display: flex; gap: 8px; border-top: 1px solid #e5e7eb; padding-top: 8px; }
    .composer textarea { flex: 1; resize: none; height: 60px; font-family: inherit; border-radius: 8px; border: 1px solid #cbd5e1; padding: 6px 8px; }
    .composer button { padding: 8px 12px; font-size: 13px; }
    .composer button:disabled { opacity: 0.5; cursor: default; }
    .composer-note { font-size: 11px; color: #6b7280; margin-top: 4px; }

    /* Change-password modal */
    .cp-overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.55);
    }
    .cp-box {
      background: #ffffff; border-radius: 16px; padding: 28px;
      width: 360px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
    }
    .cp-box h2 { margin: 0 0 20px; font-size: 16px; font-weight: 700; }
    .cp-box label { display: block; font-size: 13px; margin-top: 12px; color: #374151; }
    .cp-box input {
      width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box;
      border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px;
    }
    .cp-error { color: #b00020; font-size: 12px; margin-top: 10px; min-height: 16px; }
    .cp-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .cp-actions button {
      border-radius: 999px; border: none; padding: 7px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .cp-actions .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #06b6d4); color: white;
    }
    .cp-actions .btn-primary:hover { filter: brightness(1.05); }
    .cp-actions .btn-secondary { background: #f3f4f6; color: #374151; }
    .cp-actions .btn-secondary:hover { background: #e5e7eb; }

    @media (max-width: 900px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; max-width: none; border-right: none; border-bottom: 1px solid #e5e7eb; max-height: 40vh; }
    }
    @media (max-width: 640px) { .layout { margin: 8px; border-radius: 18px; } .login-shell { margin: 0 8px; } }
  </style>
</head>
<body>
  <div class="login-shell" id="login-view">
    <h1>Susan CRM Login</h1>
    <p>The First AI Conversational Operating System</p>
    <label for="login-email">Email</label>
    <input id="login-email" type="email" autocomplete="email" />
    <label for="login-password">Password</label>
    <input id="login-password" type="password" autocomplete="current-password" />
    <button id="login-button">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>

  <div class="app-shell" id="app-view">
    <div class="layout">
      <div class="sidebar">
        <div class="top-bar">
          <div style="display:flex; align-items:center; gap:8px;">
            <img src="susan-logo.png" alt="Susan" style="height:26px; border-radius:6px;" />
            <div>
              <div style="font-weight:700; font-size:14px;">Susan CRM</div>
              <div style="font-size:11px; color:#6b7280;">Multi-channel conversation view</div>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span id="user-email" style="font-size:11px; color:#6b7280;"></span>
            <button id="change-password-btn">Change Password</button>
            <button id="logout-button">Logout</button>
          </div>
        </div>

        <div class="filter-card">
          <div class="tenant-pill" id="active-tenant-pill">Tenant: loading...</div>
          <div class="filter-row">
            <label for="tenant-select">Tenant</label>
            <select id="tenant-select"></select>
          </div>
          <div class="filter-row">
            <label for="channel-select">Channel</label>
            <select id="channel-select">
              <option value="all">All channels</option>
              <option value="website_chat">Website chat</option>
              <option value="email">Email</option>
              <option value="whatsapp">WhatsApp</option>
              <option value="voice">Voice</option>
            </select>
          </div>
        </div>

        <div id="conversations"></div>
      </div>

      <div class="main">
        <div class="header">
          <div class="header-top">
            <div id="contact-header" class="contact-header">Select a conversation on the left.</div>
            <div class="status-controls">
              <label>Status:
                <select id="status-select" disabled>
                  <option value="open">Open</option>
                  <option value="closed">Closed</option>
                </select>
              </label>
            </div>
          </div>
          <div id="stats-panel" class="stats-panel"></div>
        </div>

        <div id="messages" class="messages"></div>
        <div class="composer">
          <textarea id="reply-text" placeholder="Manual replies are currently WhatsApp-only." disabled></textarea>
          <button id="send-btn" disabled>Send</button>
        </div>
        <div id="composer-note" class="composer-note">Select a conversation to view details.</div>
      </div>
    </div>

    <!-- Change password modal -->
    <div class="cp-overlay" id="cp-modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="cp-title">
      <div class="cp-box">
        <h2 id="cp-title">Change Password</h2>
        <form id="cp-form" novalidate>
          <label>
            Current password
            <input type="password" id="cp-current" required autocomplete="current-password" />
          </label>
          <label>
            New password
            <input type="password" id="cp-new" required autocomplete="new-password" />
          </label>
          <label>
            Confirm new password
            <input type="password" id="cp-confirm" required autocomplete="new-password" />
          </label>
          <div class="cp-error" id="cp-error"></div>
          <div class="cp-actions">
            <button type="button" class="btn-secondary" id="cp-cancel">Cancel</button>
            <button type="submit" class="btn-primary">Update password</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.susan-crm.com";
    let currentConversationId = null;
    let currentConversationMeta = null;
    let currentTenantKey = "sts";
    let currentChannel = "all";

    const tenantSelect = () => document.getElementById("tenant-select");
    const channelSelect = () => document.getElementById("channel-select");

    function showLogin() {
      document.getElementById("login-view").style.display = "block";
      document.getElementById("app-view").style.display = "none";
    }
    function showApp() {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("app-view").style.display = "block";
    }

    function apiUrl(path, params = {}) {
      const url = new URL(`${API_BASE}${path}`);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== "") url.searchParams.set(k, v);
      });
      return url.toString();
    }

    function normaliseItems(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    function channelLabel(channel) {
      const c = (channel || "").toLowerCase();
      if (c === "website_chat") return "Webchat";
      if (c === "email") return "Email";
      if (c === "whatsapp") return "WhatsApp";
      if (c === "voice") return "Voice";
      return c || "Unknown";
    }

    async function checkAuth() {
      try {
        const res = await fetch(`${API_BASE}/crm/auth/me`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          const emailSpan = document.getElementById("user-email");
          if (emailSpan && data.user && data.user.email) emailSpan.textContent = data.user.email;
          showApp();
          await fetchTenants();
          await refreshAll();
          startPolling();
        } else {
          showLogin();
        }
      } catch (e) {
        console.error("Auth check failed", e);
        showLogin();
      }
    }

    async function login() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value.trim();
      const errorEl = document.getElementById("login-error");
      errorEl.textContent = "";
      if (!email || !password) { errorEl.textContent = "Please enter email and password."; return; }
      try {
        const res = await fetch(`${API_BASE}/crm/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password }),
        });
        if (res.ok) {
          showApp();
          await fetchTenants();
          await refreshAll();
          startPolling();
        } else {
          errorEl.textContent = "Invalid credentials.";
        }
      } catch (e) {
        console.error("Login error", e);
        errorEl.textContent = "Login failed. Please try again.";
      }
    }

    async function logout() {
      stopPolling();
      try { await fetch(`${API_BASE}/crm/auth/logout`, { method: "POST", credentials: "include" }); }
      catch (e) { console.error("Logout error", e); }
      finally {
        currentConversationId = null;
        currentConversationMeta = null;
        document.getElementById("conversations").innerHTML = "";
        document.getElementById("messages").innerHTML = "";
        document.getElementById("contact-header").textContent = "Select a conversation on the left.";
        document.getElementById("reply-text").value = "";
        document.getElementById("reply-text").disabled = true;
        document.getElementById("send-btn").disabled = true;
        document.getElementById("status-select").disabled = true;
        document.getElementById("stats-panel").innerHTML = "";
        document.getElementById("composer-note").textContent = "Select a conversation to view details.";
        showLogin();
      }
    }

    async function fetchTenants() {
      const select = tenantSelect();
      select.innerHTML = "";
      try {
        const res = await fetch(`${API_BASE}/crm/tenants`, { credentials: "include" });
        if (!res.ok) throw new Error("tenant fetch failed");
        const tenants = normaliseItems(await res.json());
        tenants.forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t.tenant_key;
          opt.textContent = `${t.name || t.tenant_key} (${t.tenant_key})`;
          select.appendChild(opt);
        });
        if (tenants.some(t => t.tenant_key === "sts")) currentTenantKey = "sts";
        else if (tenants.length) currentTenantKey = tenants[0].tenant_key;
        select.value = currentTenantKey;
      } catch (e) {
        console.error("Failed to fetch tenants", e);
        ["sts", "apg", "qbe"].forEach((key) => {
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = key.toUpperCase();
          select.appendChild(opt);
        });
        select.value = currentTenantKey;
      }
      updateTenantPill();
    }

    function updateTenantPill() {
      const selected = tenantSelect().selectedOptions[0];
      document.getElementById("active-tenant-pill").textContent = `Tenant: ${selected ? selected.textContent : currentTenantKey}`;
    }

    async function refreshAll() {
      currentConversationId = null;
      currentConversationMeta = null;
      document.getElementById("messages").innerHTML = "";
      document.getElementById("contact-header").textContent = "Select a conversation on the left.";
      document.getElementById("reply-text").value = "";
      document.getElementById("reply-text").disabled = true;
      document.getElementById("send-btn").disabled = true;
      document.getElementById("status-select").disabled = true;
      document.getElementById("composer-note").textContent = "Select a conversation to view details.";
      await fetchConversations();
      await fetchStats();
    }

    async function fetchConversations() {
      const res = await fetch(apiUrl("/crm/conversations", {
        tenant_key: currentTenantKey,
        channel: currentChannel,
        page_size: 50,
      }), { credentials: "include" });
      if (!res.ok) { console.error("Failed to fetch conversations"); return; }
      renderConversations(normaliseItems(await res.json()));
    }

    function renderConversations(conversations) {
      const container = document.getElementById("conversations");
      container.innerHTML = "";
      if (!conversations.length) {
        container.innerHTML = `<div style="font-size:12px; color:#6b7280; padding:10px;">No conversations for this tenant/channel yet.</div>`;
        return;
      }
      conversations.forEach((conv) => {
        const div = document.createElement("div");
        div.className = "conversation-item";
        div.dataset.id = conv.id;

        // Preserve active highlight during silent poll refreshes
        if (conv.id === currentConversationId) div.classList.add("active");

        const displayName = conv.display_name || conv.name || conv.email || conv.phone_e164 || "Anonymous visitor";
        const channel = conv.channel_name || "unknown";

        const name = document.createElement("div");
        name.className = "conversation-name";
        name.innerHTML = `<span>${escapeHtml(displayName)}</span><span class="badge ${escapeAttr(channel)}">${channelLabel(channel)}</span>`;

        const detail = document.createElement("div");
        detail.className = "conversation-phone";
        detail.textContent = conv.email || conv.phone_e164 || conv.contact_id || "";

        const preview = document.createElement("div");
        preview.className = "conversation-preview";
        preview.textContent = conv.last_message_body || conv.last_message_preview || "";

        const meta = document.createElement("div");
        meta.className = "conversation-meta";
        const unread = conv.unread_count ? ` • ${conv.unread_count} unread` : "";
        meta.textContent = `${conv.status || "open"}${unread}`;

        div.appendChild(name); div.appendChild(detail); div.appendChild(preview); div.appendChild(meta);
        div.addEventListener("click", () => {
          document.querySelectorAll(".conversation-item").forEach((el) => el.classList.remove("active"));
          div.classList.add("active");
          loadConversation(conv);
        });
        container.appendChild(div);
      });
    }

    async function loadConversation(conv) {
      currentConversationId = conv.id;
      currentConversationMeta = conv;

      const statusSelect = document.getElementById("status-select");
      statusSelect.disabled = false;
      statusSelect.value = conv.status || "open";

      const canManualSend = (conv.channel_name || "").toLowerCase() === "whatsapp";
      document.getElementById("reply-text").disabled = !canManualSend;
      document.getElementById("send-btn").disabled = !canManualSend;
      document.getElementById("composer-note").textContent = canManualSend
        ? "Manual reply available for WhatsApp conversations."
        : "Manual sending is disabled for this channel. Susan can still reply via the live channel itself.";

      const res = await fetch(apiUrl(`/crm/conversations/${conv.id}/messages`, {
        channel: "all",
        page_size: 300,
      }), { credentials: "include" });
      if (!res.ok) { console.error("Failed to fetch conversation messages"); return; }
      const data = await res.json();
      renderConversationDetail(conv, normaliseItems(data));
      await markConversationRead(conv.id);
      fetchStats();
    }

    function renderConversationDetail(conv, messages) {
      const contactHeader = document.getElementById("contact-header");
      const messagesContainer = document.getElementById("messages");
      messagesContainer.innerHTML = "";
      const name = conv.display_name || conv.name || conv.email || conv.phone_e164 || "Anonymous visitor";
      contactHeader.textContent = `${name} • ${channelLabel(conv.channel_name)} • ${conv.tenant_key || currentTenantKey}`;

      messages.forEach((msg) => {
        const wrap = document.createElement("div");
        wrap.style.display = "flex";
        wrap.style.flexDirection = "column";
        wrap.style.alignItems = msg.direction === "outbound" ? "flex-end" : "flex-start";

        const bubble = document.createElement("div");
        bubble.className = `message ${msg.direction}`;
        bubble.textContent = msg.body;

        const meta = document.createElement("div");
        meta.className = "message-meta";
        const d = msg.created_at ? new Date(msg.created_at).toLocaleString() : "";
        meta.textContent = `${channelLabel(msg.channel_name || conv.channel_name)} ${d ? "• " + d : ""}`;

        wrap.appendChild(bubble); wrap.appendChild(meta); messagesContainer.appendChild(wrap);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function markConversationRead(conversationId) {
      try { await fetch(`${API_BASE}/crm/conversations/${conversationId}/read`, { method: "POST", credentials: "include" }); }
      catch (e) { console.error("Failed to mark conversation read", e); }
    }

    async function sendReply() {
      const textArea = document.getElementById("reply-text");
      const btn = document.getElementById("send-btn");
      const body = textArea.value.trim();
      if (!body || !currentConversationId) return;
      btn.disabled = true;
      try {
        const res = await fetch(`${API_BASE}/crm/conversations/${currentConversationId}/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ body }),
        });
        if (res.ok) {
          textArea.value = "";
          if (currentConversationMeta) await loadConversation(currentConversationMeta);
          await fetchConversations(); await fetchStats();
        } else {
          console.error("Failed to send message", await res.text());
        }
      } catch (err) { console.error("Error sending message", err); }
      finally { btn.disabled = false; }
    }

    async function updateStatus(newStatus) {
      if (!currentConversationId) return;
      try {
        const res = await fetch(`${API_BASE}/crm/conversations/${currentConversationId}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ status: newStatus }),
        });
        if (!res.ok) { console.error("Failed to update status"); return; }
        if (currentConversationMeta) currentConversationMeta.status = newStatus;
        fetchStats(); fetchConversations();
      } catch (e) { console.error("Error updating status", e); }
    }

    async function fetchStats() {
      try {
        const res = await fetch(apiUrl("/crm/stats", { tenant_key: currentTenantKey }), { credentials: "include" });
        if (!res.ok) { console.error("Failed to fetch stats"); return; }
        renderStats(await res.json());
      } catch (e) { console.error("Error fetching stats", e); }
    }

    function renderStats(stats) {
      const panel = document.getElementById("stats-panel");
      if (!panel) return;
      panel.innerHTML = `
        <div class="stat-row"><span>Total conversations</span><strong>${stats.total_conversations ?? 0}</strong></div>
        <div class="stat-row"><span>Website chat</span><strong>${stats.website_chat_conversations ?? 0}</strong></div>
        <div class="stat-row"><span>Email</span><strong>${stats.email_conversations ?? 0}</strong></div>
        <div class="stat-row"><span>WhatsApp</span><strong>${stats.whatsapp_conversations ?? 0}</strong></div>
        <div class="stat-row"><span>Unread inbound</span><strong>${stats.total_unread_inbound ?? 0}</strong></div>
      `;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"]/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));
    }
    function escapeAttr(value) { return String(value || "").replace(/[^a-zA-Z0-9_-]/g, "_"); }

    // ---- Polling ----

    const POLL_BASE_MS = 9000;
    const POLL_MAX_MS  = 72000; // caps after 3 doublings: 9s → 18s → 36s → 72s
    let pollTimer     = null;
    let pollInterval  = POLL_BASE_MS;
    let pollFailures  = 0;
    let pollingActive = false;

    function startPolling() {
      pollingActive = true;
      pollInterval  = POLL_BASE_MS;
      pollFailures  = 0;
      if (!document.hidden) schedulePoll();
    }

    function stopPolling() {
      pollingActive = false;
      if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
    }

    function schedulePoll() {
      if (pollTimer) clearTimeout(pollTimer);
      pollTimer = setTimeout(doPoll, pollInterval);
    }

    async function doPoll() {
      pollTimer = null;
      if (!pollingActive) return;
      try {
        const tasks = [silentPollConversations(), silentPollStats()];
        if (currentConversationId) tasks.push(silentPollMessages());
        await Promise.all(tasks);
        pollFailures = 0;
        pollInterval = POLL_BASE_MS;
      } catch (e) {
        pollFailures++;
        pollInterval = Math.min(POLL_BASE_MS * Math.pow(2, pollFailures), POLL_MAX_MS);
        console.warn(`[poll] failed (${pollFailures}x), backing off to ${(pollInterval / 1000).toFixed(0)}s`, e);
      }
      if (pollingActive && !document.hidden) schedulePoll();
    }

    async function silentPollConversations() {
      const res = await fetch(apiUrl("/crm/conversations", {
        tenant_key: currentTenantKey, channel: currentChannel, page_size: 50,
      }), { credentials: "include" });
      if (!res.ok) throw new Error(`conversations ${res.status}`);
      renderConversations(normaliseItems(await res.json()));
    }

    async function silentPollStats() {
      const res = await fetch(apiUrl("/crm/stats", { tenant_key: currentTenantKey }), { credentials: "include" });
      if (!res.ok) throw new Error(`stats ${res.status}`);
      renderStats(await res.json());
    }

    async function silentPollMessages() {
      if (!currentConversationId || !currentConversationMeta) return;
      const messagesEl = document.getElementById("messages");
      // Remember whether the user is scrolled to (or near) the bottom
      const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
      const prevScroll = messagesEl.scrollTop;

      const res = await fetch(apiUrl(`/crm/conversations/${currentConversationId}/messages`, {
        channel: "all", page_size: 300,
      }), { credentials: "include" });
      if (!res.ok) throw new Error(`messages ${res.status}`);
      renderConversationDetail(currentConversationMeta, normaliseItems(await res.json()));
      // renderConversationDetail always scrolls to the bottom; restore position if user had scrolled up
      if (!atBottom) messagesEl.scrollTop = prevScroll;
    }

    // Resume immediately when the tab becomes visible again
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && pollingActive && !pollTimer) doPoll();
    });

    // ---- Change password modal ----

    const cpModal  = document.getElementById("cp-modal");
    const cpForm   = document.getElementById("cp-form");
    const cpError  = document.getElementById("cp-error");

    function openCpModal() {
      cpForm.reset();
      cpError.textContent = "";
      cpModal.style.display = "flex";
      document.getElementById("cp-current").focus();
    }

    function closeCpModal() {
      cpModal.style.display = "none";
      cpForm.reset();
    }

    cpModal.addEventListener("click", (e) => {
      // Close when clicking the backdrop (the overlay itself, not the box)
      if (e.target === cpModal) closeCpModal();
    });

    document.getElementById("cp-cancel").addEventListener("click", closeCpModal);

    cpForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      cpError.textContent = "";

      const current = document.getElementById("cp-current").value;
      const newPw   = document.getElementById("cp-new").value;
      const confirm = document.getElementById("cp-confirm").value;

      if (newPw.length < 8) {
        cpError.textContent = "New password must be at least 8 characters.";
        return;
      }
      if (newPw !== confirm) {
        cpError.textContent = "New passwords do not match.";
        return;
      }

      const submitBtn = cpForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      try {
        const res = await fetch(`${API_BASE}/crm/auth/change-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ current_password: current, new_password: newPw }),
        });
        if (res.ok) {
          closeCpModal();
          alert("Password updated successfully.");
        } else {
          const data = await res.json().catch(() => ({}));
          cpError.textContent = data.detail || "Something went wrong. Please try again.";
        }
      } catch {
        cpError.textContent = "Network error. Please try again.";
      } finally {
        submitBtn.disabled = false;
      }
    });

    // ---- Event wiring ----

    document.getElementById("login-button").addEventListener("click", login);
    document.getElementById("logout-button").addEventListener("click", logout);
    document.getElementById("change-password-btn").addEventListener("click", openCpModal);
    document.getElementById("send-btn").addEventListener("click", sendReply);
    document.getElementById("status-select").addEventListener("change", (e) => updateStatus(e.target.value));
    tenantSelect().addEventListener("change", async (e) => { currentTenantKey = e.target.value; updateTenantPill(); await refreshAll(); });
    channelSelect().addEventListener("change", async (e) => { currentChannel = e.target.value; await refreshAll(); });

    checkAuth();
  </script>
</body>
</html>
